{% extends 'base.html' %}
{% block content %}
<h2>Products</h2>
<form class="mb-3 d-flex" method="GET" action="/products">
    <input type="text" name="search" class="form-control me-2" placeholder="Search by product or vendor..." value="{{ search }}">
    <button class="btn btn-success" type="submit">Search</button>
</form>
<table class="table table-striped align-middle">
    <thead>
        <tr><th>Product</th><th>Vendor</th><th>Price</th><th></th></tr>
    </thead>
    <tbody>
        {% for p in products %}
        <tr>
            <td>{{ p['name'] }}</td>
            <td>{{ p['vendor'] }}</td>
            <td>${{ "%.2f"|format(p['current_price']) }}</td>
            <td>
              <form method="POST" action="/cart/add/{{ p['productid'] }}" class="d-flex">
                <input type="number" name="qty" value="1" min="1" max="20" class="form-control form-control-sm me-2" style="width:70px">
                <button class="btn btn-sm btn-success" type="submit">Add</button>
              </form>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
